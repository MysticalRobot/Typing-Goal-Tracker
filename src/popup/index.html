<!doctype html>
<html lang="en-US">

<head>
  <meta charset="utf-8" />
  <script src="./app.ts" type="module"></script>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <h1>today's progress</h1>
  <div id="progressBarContainer">
    <progress id="progressBar" min="0" max="100" value="0"></progress>
  </div>
  <br>
  <hr>
  <h1>daily goals (min)</h1>
  <form id="dailyGoalsForm">
    <div>
      <label for="sun">sun</label>
      <!-- 1440 minutes in a day -->
      <input id="sun" class="dailyGoalInput" type="number" min="0" max="1440" value="0" />
    </div>
    <div>
      <label for="mon">mon</label>
      <input id="mon" class="dailyGoalInput" type="number" min="0" max="1440" value="0" />
    </div>
    <div>
      <label for="tue">tue</label>
      <input id="tue" class="dailyGoalInput" type="number" min="0" max="1440" value="0" />
    </div>
    <div>
      <label for="wed">wed</label>
      <input id="wed" class="dailyGoalInput" type="number" min="0" max="1440" value="0" />
    </div>
    <div>
      <label for="thu">thu</label>
      <input id="thu" class="dailyGoalInput" type="number" min="0" max="1440" value="0" />
    </div>
    <div>
      <label for="fri">fri</label>
      <input id="fri" class="dailyGoalInput" type="number" min="0" max="1440" value="0" />
    </div>
    <div>
      <label for="sat">sat</label>
      <input id="sat" class="dailyGoalInput" type="number" min="0" max="1440" value="0" />
    </div>
    <button id="saveDailyGoalsInput" class="hoverable" type="submit">save</button>
  </form>
  <hr>
  <h1>settings</h1>
  <h2>notifications</h2>
  <form id="notifPreferenceForm">
    <button class="radioButton hoverable" data-value="never">never</button>
    <button class="radioButton hoverable" data-value="quarterGoalCompletion">quarter goal completion</button>
    <button class="radioButton hoverable" data-value="halfGoalCompletion">half goal completion</button>
    <button class="radioButton hoverable" data-value="goalCompletion">goal completion</button>
  </form>
  <h2>popup toggle</h2>
  <div id="popupToggleContainer" >
    <span id="popupToggle" ></span>
    <span>|</span>
    <span><a id="editPopupToggleLink" >edit</a></span>
  </div>
  <!-- TODO make same color as rest of label -->
  <h2>reloading to enact changes</h2>
  <form id="reloadingPreferenceForm">
    <button class="radioButton hoverable" data-value="off">off</button>
    <button class="radioButton hoverable" data-value="on">on</button>
  </form>
  <h2>tracked sites</h2>
  <form id="sitePatternInputForm">
    <label id="sitePatternInputLabel" for="sitePatternInput">
      site or
      <a href="https://developer.mozilla.org/en-US/docs/Mozilla/Add-ons/WebExtensions/Match_patterns">
        match pattern
      </a>
    </label>
    <!-- TODO add more explanations and add links between explanataions -->
    <p class="settingDescription">hello how are you</p>
    <div id="sitePatternTrackingInputs" class="threeToOneSplit">
      <!-- 
        Accepts a subset of the following patterns of URLs:
        https://developer.mozilla.org/en-US/docs/Mozilla/Add-ons/WebExtensions/Match_patterns 
      -->
      <!-- TODO make / for path at end optional, slap on / in onInput handler -->
      <!-- TODO limit max length to 8000 -->
      <input id="sitePatternInput" 
             type="text" 
             placeholder="https://monkeytype.com/"
             required 
             pattern="(https?|wss?)(:\/\/)((?:\*|(?:\*\.)?[a-zA-Z0-9\-]+(?:\.[a-zA-Z0-9\-]+)*(?::[0-9]+)?))(\/.*)"
             />
      <button id="trackSitePattern" class="hoverable"/>track</button>
    </div>
  </form>
  <div id="trackedSitePatterns" >
  </div>
</body>

</html>
